# This is workflow name
name: Hello
#run on a trigger
on:
    push:
        branches: [mail]
        
# There are jobs inside the workflow
jobs:

     #This is the name of job
    greet:
        #this is github runner
        runs-on: ubuntu-latest
        steps:
        - name: say hello to user
          run: echo "Hello Dosto"

        - name: say hello to users
          run: echo "Hello $USER"


  
